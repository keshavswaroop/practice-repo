name: Demo Pipeline
on: workflow_dispatch

env:
    RepoName: abc
    version: 1

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Clone Repo
              run: |
                  echo "Clonning the repo ${{env.RepoName}}"
            - name: Version
              run: echo "${{env.version}}"
            - name: upload artifact
              uses: actions/upload-artifact@v3
              with:
                  name: artifact-test
                  path: |
                      test

    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v3
              with:
                  name: artifact-test
            - name: Output document
              run: cat artifact-test
