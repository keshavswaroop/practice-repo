name: Demo Pipeline
on: workflow_dispatch

env:
    RepoName: abc
    version: 1

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Clone Repo
              run: |
                  echo "Clonning the repo ${{env.RepoName}}"
            - name: Version
              run: echo "${{env.version}}"
            - name: Create a file as we are not clonning the repo
              run: echo "Hi there, this is a test document" > test.txt
            - name: upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: artifact-test
                  path: |
                      test.txt

    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Download artifact
              id: download_artifact
              uses: actions/download-artifact@v4
              with:
                  name: artifact-test
            - name: Output document
              id: output_doc
              # run: cat test.txt
              run: cat artifact

            - name: error
              if: failure() && steps.output_doc.outcome == 'failure'
              run: echo "Incorrect file name, cannot download"
